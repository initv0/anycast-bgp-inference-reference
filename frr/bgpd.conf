! FRR bgpd.conf — anycast edge router (example region: us-east-1)
!
! Announces a shared anycast VIP conditionally on local inference health, with
! BFD for fast peer-failure detection and communities for regional signaling.
! Uses documentation IPs (RFC 5737) and private ASNs (RFC 6996) — adapt to yours.
!
! Companion to:
!   https://vkafed.com/blog/bgp-for-the-ai-era-multi-region-routing-for-inference-workloads/
!
router bgp 65001
 bgp router-id 10.10.1.1
 no bgp ebgp-requires-policy

 neighbor 203.0.113.1 remote-as 64500
 neighbor 203.0.113.1 description TRANSIT-1
 neighbor 203.0.113.1 bfd
 neighbor 203.0.113.1 bfd profile fast

 neighbor 203.0.113.5 remote-as 64500
 neighbor 203.0.113.5 description TRANSIT-2
 neighbor 203.0.113.5 bfd
 neighbor 203.0.113.5 bfd profile fast

 address-family ipv4 unicast
  redistribute connected route-map ANYCAST-HEALTH
  neighbor 203.0.113.1 route-map SET-REGION-COMMUNITY out
  neighbor 203.0.113.5 route-map SET-REGION-COMMUNITY out
 exit-address-family
!
bfd
 profile fast
  detect-multiplier 3
  transmit-interval 150
  receive-interval 150
 exit
!
! redistribute connected advertises the VIP only while its loopback (connected)
! address exists. The health agent removes that loopback address on SLO breach,
! so bgpd withdraws the prefix from every eBGP peer.
route-map ANYCAST-HEALTH permit 10
 match ip address prefix-list ANYCAST-VIP
!
! 65001:100  — origin/region tag
! 65001:910  — region priority tier (9xx): upstream/route-reflector policy can
!              de-prefer a region running at reduced GPU capacity without
!              withdrawing it entirely.
route-map SET-REGION-COMMUNITY permit 10
 set community 65001:100 65001:910 additive
!
ip prefix-list ANYCAST-VIP seq 5 permit 198.51.100.10/32
